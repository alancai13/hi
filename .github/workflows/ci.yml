# .github/workflows/ci.yml
#
# STATUS: Placeholder workflow. Steps are stubbed — fill in as the project grows.
#
# Triggers on push/PR to main. Runs lint, type-check, and test steps
# for both frontend and backend.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      - name: Type check
        run: npm run type-check
        working-directory: apps/web

      # TODO: Add unit tests when test suite is set up
      # - name: Test
      #   run: npm test
      #   working-directory: apps/web

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: apps/api

      - name: Ruff lint
        run: ruff check app/
        working-directory: apps/api

      - name: Ruff format check
        run: ruff format --check app/
        working-directory: apps/api

      # TODO: Add mypy strict type checking
      # - name: Type check
      #   run: mypy app/
      #   working-directory: apps/api

      # TODO: Add pytest when test suite is set up
      # - name: Test
      #   run: pytest
      #   working-directory: apps/api

